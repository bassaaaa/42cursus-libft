name: Notify Discord

on:
  workflow_call:
    inputs:
      job_status:
        type: string
        required: true
      norm_output:
        type: string
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    if: vars.DISCORD_WEBHOOK_URL != '' || true  # secretの有無はrun内で判定
    steps:
      - name: Notify Discord
        if: env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ inputs.job_status }}
          NORM_OUTPUT: ${{ inputs.norm_output }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          TRUNCATED=$(printf '```\n%s\n```' "$(echo "$NORM_OUTPUT" | head -c 990)")
          if [ "$JOB_STATUS" = "success" ]; then
            COLOR=3066993
            TITLE="✅ Norminette Passed"
          else
            COLOR=15158332
            TITLE="❌ Norminette Error"
          fi
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --argjson color "$COLOR" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg commit "$COMMIT_MSG" \
            --arg actor "$ACTOR" \
            --arg url "$COMMIT_URL" \
            --arg output "$TRUNCATED" \
            '{
              embeds: [{
                title: $title,
                color: $color,
                fields: [
                  { name: "Repo",   value: $repo,   inline: true },
                  { name: "Branch", value: $branch, inline: true },
                  { name: "Commit", value: $commit, inline: false },
                  { name: "By",     value: $actor,  inline: true },
                  { name: "Result", value: $output, inline: false },
                  { name: "\u200b", value: ("[GitHubで確認](" + $url + ")"), inline: false }
                ]
              }]
            }')
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
